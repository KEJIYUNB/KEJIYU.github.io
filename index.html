<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>科技鱼 · KEJIYU</title>
  <meta name="description" content="KEJIYU 的个人小站，记录代码、项目和一些有趣的尝试。" />
  <style>
    /* 基础重置 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f1320;
      --bg-soft: rgba(24, 31, 49, 0.82);
      --panel: rgba(26, 34, 53, 0.88);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #e5e7eb;
      --text-soft: #c7ced9;
      --muted: #8b95a7;
      --accent: #31b55a;
      --accent-hover: #2aa350;
      --secondary: #2a3549;
      --secondary-hover: #38455c;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-pill: 999px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      color: var(--text);
      /* 动态渐变背景 */
      background:
        radial-gradient(circle at top center, rgba(49, 181, 90, 0.16), transparent 32%),
        radial-gradient(circle at 20% 20%, rgba(49, 181, 90, 0.08), transparent 25%),
        radial-gradient(circle at 80% 10%, rgba(91, 132, 255, 0.08), transparent 24%),
        linear-gradient(180deg, #101522, #0d111b, #101522, #0d111b);
      background-size: 200% 200%;
      animation: gradientShift 16s ease infinite;
      display: flex;
      justify-content: center;
      padding: 72px 20px 36px;
      overflow-x: hidden;
      position: relative;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
      100% { background-position: 0% 0%; }
    }

    /* 网格线 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.55), transparent 85%);
      z-index: 0;
    }

    /* 粒子背景容器 */
    #particles-js {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* 鼠标跟随光晕 */
    #glow {
      position: fixed;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle at center, rgba(49, 181, 90, 0.25), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 2;
      transform: translate(-50%, -50%);
      transition: transform 0.05s linear;
      filter: blur(20px);
    }

    .container {
      width: 100%;
      max-width: 760px;
      text-align: center;
      position: relative;
      z-index: 3;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: var(--radius-pill);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-soft);
      font-size: 0.92rem;
      margin-bottom: 18px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    h1 {
      font-size: clamp(2.8rem, 6vw, 4.2rem);
      font-weight: 800;
      line-height: 1.08;
      color: #ffffff;
      letter-spacing: -0.03em;
      margin-bottom: 14px;
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .brand-accent {
      color: var(--accent);
    }

    .subtitle {
      font-size: clamp(1.02rem, 2.2vw, 1.2rem);
      color: var(--text-soft);
      margin-bottom: 12px;
    }

    .slogan {
      font-size: 0.98rem;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .intro {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-xl);
      padding: 28px 26px;
      margin: 0 auto 28px;
      text-align: left;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow: hidden;
      z-index: 4;
    }

    .intro::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(49, 181, 90, 0.12), transparent 45%);
      pointer-events: none;
    }

    .intro::after {
      content: "";
      position: absolute;
      top: 18px;
      bottom: 18px;
      left: 0;
      width: 4px;
      border-radius: 999px;
      background: linear-gradient(180deg, #46d36f 0%, #31b55a 100%);
      box-shadow: 0 0 20px rgba(49, 181, 90, 0.35);
    }

    .intro p {
      position: relative;
      z-index: 1;
      color: var(--text-soft);
      font-size: 1.06rem;
    }

    .intro p + p {
      margin-top: 10px;
    }

    .intro strong {
      color: #ffffff;
      font-weight: 700;
    }

    .actions {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 15px 30px;
      border: none;
      border-radius: var(--radius-pill);
      text-decoration: none;
      font-size: 1.06rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      will-change: transform;
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.primary {
      background: linear-gradient(180deg, #39c864 0%, #31b55a 100%);
      color: #ffffff;
      box-shadow: 0 12px 30px rgba(49, 181, 90, 0.28);
    }

    .btn.primary:hover {
      background: linear-gradient(180deg, #3fd76d 0%, #2aa350 100%);
      transform: translateY(-2px);
      box-shadow: 0 18px 36px rgba(49, 181, 90, 0.36);
    }

    .btn.secondary {
      background: rgba(42, 53, 73, 0.78);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    .btn.secondary:hover {
      background: var(--secondary-hover);
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
    }

    .links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
      margin-bottom: 36px;
    }

    .link-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: var(--radius-pill);
      color: var(--muted);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.2s ease;
      font-size: 0.94rem;
    }

    .link-chip:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
    }

    .footer {
      margin-top: 8px;
      color: #6f7a8d;
      font-size: 0.88rem;
      line-height: 1.7;
    }

    .footer-line {
      width: 88px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      margin: 0 auto 16px;
    }

    .footer .small {
      display: block;
      margin-top: 4px;
      font-size: 0.82rem;
      color: #5f697b;
    }

    @media (max-width: 640px) {
      body {
        padding-top: 48px;
      }

      .intro {
        padding: 24px 20px;
      }

      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

      .links {
        gap: 8px;
      }

      .link-chip {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
  <!-- 引入 particles.js 库 -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
</head>
<body>
  <!-- 粒子背景容器 -->
  <div id="particles-js"></div>
  <!-- 鼠标跟随光晕 -->
  <div id="glow"></div>

  <main class="container">
    <div class="hero-badge">🐟 KEJIYU · Personal Site</div>

    <h1><span class="brand-accent">科技鱼</span> / KEJIYU</h1>
    <p class="subtitle">一条喜欢技术、代码和有趣项目的鱼。</p>
    <p class="slogan">这里记录我的作品、折腾过程，以及一些小而好玩的尝试。</p>

    <section class="intro">
      <p><strong>你好，我是 KEJIYU。</strong></p>
      <p>
        欢迎来到我的个人小站。这里会放一些我写过的代码、做过的项目，
        还有偶尔折腾出来的有趣作品。
      </p>
      <p>
        大部分内容都会同步到 GitHub，有任何问题欢迎联系我。
      </p>
    </section>

    <div class="actions">
      <a href="https://github.com/KEJIYUNB/" target="_blank" rel="noopener noreferrer" class="btn primary">
        📂 查看我的 GitHub
      </a>
      <a href="mailto:KEJIYUNB@gmail.com" class="btn secondary">
        ✉️ 联系我
      </a>
    </div>

    <div class="links">
      <!-- 修正：俄罗斯方块链接使用无斜杠的相对路径，确保本地预览正常 -->
      <a href="ELSFK.html" class="link-chip">🕹️ 玩俄罗斯方块</a>
      <a href="https://greasyfork.org/zh-CN/scripts/569818-4399%E5%85%8D%E7%99%BB%E5%BD%95" target="_blank" rel="noopener noreferrer" class="link-chip">🛡️ 4399免登录脚本</a>
    </div>

    <footer class="footer">
      <div class="footer-line"></div>
      <div>© 2026 科技鱼 · Built with GitHub Pages</div>
      <span class="small">简洁一点，折腾一点，顺便把有趣的东西留下来。</span>
    </footer>
  </main>

  <script>
    // 粒子背景配置
    particlesJS("particles-js", {
      particles: {
        number: { value: 60, density: { enable: true, value_area: 800 } },
        color: { value: "#31b55a" },
        shape: { type: "circle" },
        opacity: { value: 0.5, random: true },
        size: { value: 3, random: true },
        line_linked: { enable: true, distance: 150, color: "#31b55a", opacity: 0.3, width: 1 },
        move: { enable: true, speed: 2, direction: "none", random: true, straight: false, out_mode: "out" }
      },
      interactivity: {
        detect_on: "canvas",
        events: { onhover: { enable: true, mode: "grab" }, onclick: { enable: true, mode: "push" } },
        modes: { grab: { distance: 180, line_linked: { opacity: 0.6 } }, push: { particles_nb: 4 } }
      },
      retina_detect: true
    });

    // 鼠标跟随光晕
    const glow = document.getElementById('glow');
    document.addEventListener('mousemove', (e) => {
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';
    });
  </script>
</body>
</html>
