<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科技鱼 · KEJIYUNB</title>
    <style>
        /* 这里保留了原来的基础样式，你可以根据需要调整 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #10131f;
            color: #d1d5db;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            line-height: 1.5;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: bold;
            color: #31b55a;
            margin-bottom: 1rem;
        }
        .intro {
            background-color: #1a2235;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            font-size: 1.1rem;
            border-left: 4px solid #31b55a;
            text-align: left;
        }
        .btn {
            display: inline-block;
            background-color: #31b55a;
            color: white;
            font-weight: 500;
            padding: 14px 28px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 1.2rem;
            transition: background-color 0.2s;
            margin: 10px 0;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #2aa350;
        }
        .btn.secondary {
            background-color: #2a3549;
            color: #d1d5db;
            font-size: 1rem;
            padding: 10px 20px;
        }
        .btn.secondary:hover {
            background-color: #3a4559;
        }
        .footer {
            margin-top: 40px;
            color: #6b7280;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐟 科技鱼</h1>

        <div class="intro">
            <p style="margin-bottom: 10px;">你好，我是 KEJIYUNB。</p>
            <p>一条对技术感兴趣的鱼。这里是我的个人小站，所有的代码和项目都会放在 GitHub 上。</p>
            <!-- 你可以在这里修改或补充你的个人介绍 -->
        </div>

        <!-- 主要的 GitHub 按钮 -->
        <a href="https://github.com/KEJIYUNB/" target="_blank" class="btn">
            📂 查看我的 GitHub
        </a>

        <!-- 可选的俄罗斯方块小按钮 -->
        <div style="margin-top: 20px;">
            <a href="/ELSFK.html" class="btn secondary">
                🎮 玩俄罗斯方块
            </a>
        </div>

        <div class="footer">
            © 2026 科技鱼 · 由 GitHub Pages 驱动
        </div>
    </div>
</body>
</html>
